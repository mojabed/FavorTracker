name: Release to ESOUI

on:
  push:
    branches: [main]
    paths:
      - 'FavorTracker.txt'
      - 'CHANGELOG.md'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version from manifest
        id: manifest
        run: |
          VERSION=$(grep '## Version:' FavorTracker.txt | sed 's/## Version: *//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Create zip
        run: |
          mkdir -p /tmp/FavorTracker
          cp FavorTracker.lua FavorTracker.txt README.md CHANGELOG.md /tmp/FavorTracker/
          cd /tmp && zip -r ${{ github.workspace }}/FavorTracker.zip FavorTracker

      - name: Upload to ESOUI
        uses: m00nyONE/esoui-upload@v2
        with:
          api_key: ${{ secrets.ESOUI_API_KEY }}
          addon_id: '4717'
          version: ${{ steps.manifest.outputs.version }}
          zip_file: FavorTracker.zip
          changelog_file: CHANGELOG.md
          compatibility: '12.0.7'
